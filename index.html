<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admission Follow-up CRM</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #182230;
      --muted: #667085;
      --line: #d8dee8;
      --dark: #202939;
      --green: #067647;
      --green-soft: #e8f7ef;
      --red: #b42318;
      --red-soft: #fde8e7;
      --amber: #946200;
      --amber-soft: #fff2cc;
      --blue: #175cd3;
      --blue-soft: #e9f1ff;
      --shadow: 0 8px 22px rgba(24, 34, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.35;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 246, 248, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .topbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 14px 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .subline {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 10px 11px;
      min-height: 42px;
    }

    .manager-tools {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    textarea {
      resize: vertical;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(6, minmax(96px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding: 10px 14px 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 8px;
      font-size: 13px;
      font-weight: 800;
      min-height: 40px;
      white-space: nowrap;
    }

    .tab.active {
      border-color: var(--dark);
      background: var(--dark);
      color: #fff;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 2px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .list,
    .staff-grid {
      display: grid;
      gap: 12px;
    }

    .card,
    .staff-row {
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 5px solid #98a2b3;
      border-radius: 8px;
      padding: 13px;
      box-shadow: var(--shadow);
    }

    .hot {
      border-left-color: var(--amber);
    }

    .missed {
      border-left-color: var(--red);
    }

    .visit {
      border-left-color: var(--blue);
    }

    .done-card {
      border-left-color: var(--green);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .name {
      font-size: 17px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .phone {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.hot {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .badge.missed {
      color: var(--red);
      background: var(--red-soft);
    }

    .badge.visit {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .badge.done-card {
      color: var(--green);
      background: var(--green-soft);
    }

    .badge.normal {
      color: var(--dark);
      background: #eef1f5;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .meta b {
      color: var(--text);
      display: block;
      font-size: 12px;
      margin-bottom: 1px;
    }

    .notes {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: #344054;
      font-size: 13px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 11px 8px;
      min-height: 42px;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }

    .call {
      color: #fff;
      background: var(--green);
    }

    .wa {
      color: #fff;
      background: #128c7e;
    }

    .update {
      color: #fff;
      background: var(--dark);
    }

    .secondary {
      color: var(--text);
      background: #eef1f5;
    }

    .danger {
      color: #fff;
      background: var(--red);
    }

    .file-btn input {
      display: none;
    }

    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 22px;
      text-align: center;
    }

    .staff-row h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .staff-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .staff-metrics strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 2px;
    }

    dialog {
      width: min(94vw, 520px);
      border: 0;
      border-radius: 8px;
      box-shadow: 0 20px 70px rgba(24, 34, 48, 0.24);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(24, 34, 48, 0.45);
    }

    .modal {
      padding: 16px;
    }

    .modal h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    @media (min-width: 760px) {
      .controls {
        grid-template-columns: 160px 220px 1fr;
      }

      .manager-tools {
        grid-template-columns: repeat(4, 1fr);
      }

      .stats {
        grid-template-columns: repeat(6, 1fr);
      }

      .list,
      .staff-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    #loginScreen {
      position: fixed;
      inset: 0;
      background: rgba(24, 34, 48, 0.92);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: #fff;
      border-radius: 14px;
      padding: 28px 22px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .login-box h2 {
      margin: 0 0 6px;
      font-size: 20px;
      text-align: center;
    }

    .login-subtitle {
      text-align: center;
      color: #667085;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .login-role-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }

    .login-error {
      color: #b42318;
      background: #fde8e7;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
    }

    .connect-box {
      background: #f0f7ff;
      border: 1px solid #b8d4f8;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .connect-box h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #175cd3;
    }

    .connect-url {
      font-size: 16px;
      font-weight: 800;
      word-break: break-all;
      margin-bottom: 8px;
      color: #182230;
    }

    .connect-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    #qrCanvas {
      display: block;
      margin: 10px auto 0;
      border-radius: 8px;
    }

    .staff-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 10px;
    }

    .staff-table th {
      text-align: left;
      padding: 8px 10px;
      background: #f5f6f8;
      border-bottom: 1px solid #d8dee8;
      font-size: 12px;
      color: #667085;
    }

    .staff-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0f1f3;
    }

    .staff-table input {
      min-height: 34px;
      padding: 6px 8px;
      font-size: 13px;
    }

    .logout-btn {
      border: 1px solid #d8dee8;
      background: #fff;
      color: #667085;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 6px;
    }

    .manager-tools {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>Admission Follow-up CRM</h1>
      <div class="subline" id="todayText"></div>
      <div class="controls">
        <select id="roleFilter" aria-label="Login mode">
          <option>Manager</option>
          <option>Staff</option>
        </select>
        <select id="staffFilter" aria-label="Staff filter"></select>
        <input id="searchInput" type="search" placeholder="Search name, phone, college, course">
      </div>
    </div>
    <nav class="tabs" aria-label="Dashboard tabs">
      <button class="tab active" data-view="today">Today Calls</button>
      <button class="tab" data-view="later">Call Later</button>
      <button class="tab" data-view="visit">Visit Expected</button>
      <button class="tab" data-view="hot">Hot Leads</button>
      <button class="tab" data-view="missed">Missed</button>
      <button class="tab" data-view="manager">Manager</button>
    </nav>
  </header>

  <main>
    <section id="managerTools" hidden>
      <div class="connect-box" id="connectBox">
        <h3>Staff Connect</h3>
        <div class="connect-url" id="connectUrl">Loading...</div>
        <div class="connect-actions">
          <button class="btn secondary" type="button" onclick="copyConnectUrl()">Copy Link</button>
          <button class="btn secondary" type="button" id="qrToggleBtn" onclick="toggleQr()">Show QR</button>
        </div>
        <div id="qrContainer" style="margin-top:10px;text-align:center"></div>
      </div>
      <div class="manager-tools">
        <button class="btn update" type="button" id="addStudentBtn">Add Student</button>
        <label class="btn secondary file-btn">Import CSV<input id="csvInput" type="file" accept=".csv,text/csv"></label>
        <button class="btn secondary" type="button" id="exportBtn">Export CSV</button>
        <button class="btn secondary" type="button" id="manageStaffBtn">Manage Staff</button>
        <button class="btn danger" type="button" id="resetBtn">Reset Demo</button>
      </div>
    </section>
    <section class="stats" id="stats"></section>
    <section class="list" id="leadList"></section>
    <section class="staff-grid" id="managerList" hidden></section>
  </main>

  <div id="staffLoginOverlay" hidden>
    <div class="login-box">
      <h2>Staff Login</h2>
      <p class="login-subtitle">உங்கள் பேரு select பண்ணி PIN போடுங்க</p>
      <div class="field" style="margin-top:4px">
        <label>Your Name</label>
        <select id="staffLoginName"></select>
      </div>
      <div class="field">
        <label>PIN</label>
        <input type="password" id="staffLoginPin" placeholder="PIN (default: 1234)" maxlength="4" inputmode="numeric" autocomplete="off">
      </div>
      <div id="staffLoginErr" class="login-error" hidden>Wrong PIN. Try again.</div>
      <button class="btn update" type="button" onclick="doStaffPinLogin()" style="width:100%;margin-top:12px;min-height:48px;font-size:16px">Login</button>
    </div>
  </div>

  <dialog id="studentDialog">
    <form class="modal" method="dialog" id="studentForm">
      <h2>Add student lead</h2>
      <div class="form-grid">
        <div class="field">
          <label for="newStudent">Student Name</label>
          <input id="newStudent" type="text" required>
        </div>
        <div class="field">
          <label for="newPhone">Phone Number</label>
          <input id="newPhone" type="tel" required placeholder="919876543210">
        </div>
        <div class="field">
          <label for="newArea">Area</label>
          <input id="newArea" type="text" required>
        </div>
        <div class="field">
          <label for="newStaff">Assigned Staff</label>
          <input id="newStaff" type="text" required placeholder="Priya">
        </div>
        <div class="field">
          <label for="newGroup">12th Group</label>
          <select id="newGroup">
            <option>Bio Maths</option>
            <option>Computer Science</option>
            <option>Commerce</option>
            <option>Pure Science</option>
            <option>Arts</option>
            <option>Vocational</option>
          </select>
        </div>
        <div class="field">
          <label for="newCutoff">Cutoff Mark</label>
          <input id="newCutoff" type="number" min="0" max="200" step="0.01">
        </div>
        <div class="field">
          <label for="newCommunity">Community</label>
          <select id="newCommunity">
            <option>OC</option>
            <option>BC</option>
            <option>BCM</option>
            <option>MBC</option>
            <option>SC</option>
            <option>SCA</option>
            <option>ST</option>
          </select>
        </div>
        <div class="field">
          <label for="newFirstGraduate">First Graduate</label>
          <select id="newFirstGraduate">
            <option>Yes</option>
            <option>No</option>
            <option>Not Sure</option>
          </select>
        </div>
        <div class="field">
          <label for="newCourse">Interested Course</label>
          <input id="newCourse" type="text" required>
        </div>
        <div class="field">
          <label for="newCollege">College</label>
          <input id="newCollege" type="text" required>
        </div>
      </div>
      <div class="field">
        <label for="newNotes">Notes</label>
        <textarea id="newNotes" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" value="cancel" type="button" id="studentCancelBtn">Cancel</button>
        <button class="btn update" value="default" type="submit">Save Lead</button>
      </div>
    </form>
  </dialog>

  <dialog id="updateDialog">
    <form class="modal" method="dialog" id="updateForm">
      <h2 id="modalTitle">Update student</h2>
      <input type="hidden" id="leadId">

      <div class="form-grid">
        <div class="field">
          <label for="callResult">Call Result</label>
          <select id="callResult">
            <option>New Lead</option>
            <option>Interested</option>
            <option>Call Later</option>
            <option>No Response</option>
            <option>Not Interested</option>
            <option>Parent Need to Speak</option>
            <option>Coming to College</option>
            <option>Visited</option>
            <option>Admission Done</option>
          </select>
        </div>

        <div class="field">
          <label for="interestLevel">Interest Level</label>
          <select id="interestLevel">
            <option>Hot</option>
            <option>Warm</option>
            <option>Low</option>
          </select>
        </div>

        <div class="field">
          <label for="nextDateInput">Next Date</label>
          <input id="nextDateInput" type="date">
        </div>

        <div class="field">
          <label for="nextTimeInput">Next Time</label>
          <input id="nextTimeInput" type="time">
        </div>

        <div class="field">
          <label for="groupInput">12th Group</label>
          <select id="groupInput">
            <option>Bio Maths</option>
            <option>Computer Science</option>
            <option>Commerce</option>
            <option>Pure Science</option>
            <option>Arts</option>
            <option>Vocational</option>
          </select>
        </div>

        <div class="field">
          <label for="cutoffInput">Cutoff Mark</label>
          <input id="cutoffInput" type="number" min="0" max="200" step="0.01">
        </div>

        <div class="field">
          <label for="communityInput">Community</label>
          <select id="communityInput">
            <option>OC</option>
            <option>BC</option>
            <option>BCM</option>
            <option>MBC</option>
            <option>SC</option>
            <option>SCA</option>
            <option>ST</option>
          </select>
        </div>

        <div class="field">
          <label for="firstGraduateInput">First Graduate</label>
          <select id="firstGraduateInput">
            <option>Yes</option>
            <option>No</option>
            <option>Not Sure</option>
          </select>
        </div>

        <div class="field">
          <label for="courseInput">Interested Course</label>
          <input id="courseInput" type="text">
        </div>

        <div class="field">
          <label for="collegeInput">College</label>
          <input id="collegeInput" type="text">
        </div>
      </div>

      <div class="field">
        <label for="notesInput">Staff Notes</label>
        <textarea id="notesInput" rows="4" placeholder="Student/parent discussion, fee concern, visit promise"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn secondary" value="cancel" type="button" id="cancelBtn">Cancel</button>
        <button class="btn update" value="default" type="submit">Save Update</button>
      </div>
    </form>
  </dialog>

  <dialog id="staffDialog">
    <div class="modal">
      <h2>Manage Staff</h2>
      <p style="font-size:13px;color:#667085;margin-top:-6px">Add/remove staff and set PINs. Default PIN: 1234</p>
      <table class="staff-table" id="staffTable">
        <thead><tr><th>Name</th><th>PIN</th><th></th></tr></thead>
        <tbody id="staffTableBody"></tbody>
      </table>
      <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input id="newStaffName" type="text" placeholder="Staff name">
        <input id="newStaffPin" type="text" placeholder="PIN (4 digits)" maxlength="4" inputmode="numeric">
      </div>
      <div class="modal-actions">
        <button class="btn secondary" type="button" id="staffDialogClose">Close</button>
        <button class="btn update" type="button" onclick="addStaffMember()">Add Staff</button>
      </div>
      <div style="margin-top:14px;border-top:1px solid #d8dee8;padding-top:14px">
        <div class="field">
          <label>Change Manager Password</label>
          <input type="password" id="newManagerPwd" placeholder="New password">
        </div>
        <button class="btn secondary" type="button" onclick="changeManagerPwd()" style="width:100%">Update Password</button>
      </div>
    </div>
  </dialog>

    function normalizePhone(value) {
      const digits = String(value).replace(/\D/g, "");
      return digits.length === 10 ? `91${digits}` : digits;

    function toISODate(date) {
      return date.toISOString().slice(0, 10);
    }

    function addDays(days) {
      const date = new Date(today);
      date.setDate(date.getDate() + days);
      return toISODate(date);

    function isAdmissionDone(lead) {
      return lead.callResult === "Admission Done" || Boolean(lead.admissionDoneDate);
    }

    function isMissed(lead) {
      return lead.nextDate < isoToday && !isAdmissionDone(lead);
    }

    function isTodayCall(lead) {
      return lead.nextDate === isoToday && !isAdmissionDone(lead);
    }

    function isCallLater(lead) {
      return lead.callResult === "Call Later" && !isAdmissionDone(lead);
    }

    function isVisitExpected(lead) {
      return ["Coming to College", "Visited"].includes(lead.callResult) && !isAdmissionDone(lead);
    }

    function isHot(lead) {
      return lead.interestLevel === "Hot" && !isAdmissionDone(lead);
    }

    function filteredLeads() {
      const staff = staffFilter.value;
      const term = searchInput.value.trim().toLowerCase();

      return leads.filter((lead) => {
        const matchesStaff = roleFilter.value === "Staff" ? lead.staff === staff : staff === "All Staff" || lead.staff === staff;
        const haystack = `${lead.student} ${lead.phone} ${lead.area} ${lead.group} ${lead.course} ${lead.college} ${lead.callResult}`.toLowerCase();
        const matchesSearch = !term || haystack.includes(term);
        const matchesView =
          activeView === "today" ? isTodayCall(lead) :
          activeView === "later" ? isCallLater(lead) :
          activeView === "visit" ? isVisitExpected(lead) :
          activeView === "hot" ? isHot(lead) :
          activeView === "missed" ? isMissed(lead) :
          true;

        return matchesStaff && matchesSearch && matchesView;
      }).sort((a, b) => `${a.nextDate} ${a.nextTime}`.localeCompare(`${b.nextDate} ${b.nextTime}`));
    }

    function importCsv(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async () => {
        const imported = parseCsv(String(reader.result));
        const mapped = imported.map((row) => ({
          student: row.student || row.name || "",
          phone: normalizePhone(row.phone || row.mobile || ""),
          area: row.area || row.district || "",
          staff: row.staff || row.assignedStaff || "Unassigned",
          group: row.group || row.twelfthGroup || "Computer Science",
          cutoff: Number(row.cutoff || row.cutoffMark || 0),
          community: row.community || "BC",
          firstGraduate: row.firstGraduate || "Not Sure",
          course: row.course || row.interestedCourse || "",
          college: row.college || row.interestedCollege || "Not decided",
          callResult: row.callResult || "New Lead",
          interestLevel: row.interestLevel || "Warm",
          lastCall: row.lastCall || "",
          nextDate: row.nextDate || isoToday,
          nextTime: row.nextTime || "10:00",
          visitDate: row.visitDate || "",
          admissionDoneDate: row.admissionDoneDate || "",
          callsDone: Number(row.callsDone || 0),
          notes: row.notes || ""
        })).filter((lead) => lead.student && lead.phone);

        await fetch("/api/import", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ leads: mapped })

        await loadLeads();
        event.target.value = "";

    function csvCell(value) {
      const text = String(value).replaceAll('"', '""');
      return /[",\n]/.test(text) ? `"${text}"` : text;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some((item) => item.trim())) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      if (row.some((item) => item.trim())) rows.push(row);
      const headers = rows.shift().map((header) => header.trim());
      return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] || ""])));
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

        body: JSON.stringify(config)
      });
      document.getElementById("newManagerPwd").value = "";
      alert("Password updated!");
    }

    // ---- Init ----
    async function init() {
      await loadConfig();
      await loadLeads();
      await loadConnectInfo();
      render();
    }

    init();
  </script>
</body>
</html>
